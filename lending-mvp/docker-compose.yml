version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Lending MVP — PostgreSQL 16 Only Stack
#   Frontend  : React (Vite) → http://localhost:3010
#   Backend   : FastAPI + Strawberry GraphQL → http://localhost:8001
#   PostgreSQL: Port 5433 (host) → 5432 (container)   — PostgreSQL 16
#   Redis     : Port 6380 (host) → 6379 (container)   — avoids host conflicts
#   MongoDB   : REMOVED (full migration to PostgreSQL 16)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  lending_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lending_postgres
    restart: unless-stopped
    networks:
      - lending_net
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lending_db}
      POSTGRES_USER: ${POSTGRES_USER:-lending_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lending_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lending_user} -d ${POSTGRES_DB:-lending_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lending_redis
    restart: unless-stopped
    networks:
      - lending_net
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-lending_redis_pass} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lending_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI — PostgreSQL 16 only) ─────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: lending_backend
    restart: unless-stopped
    networks:
      - lending_net
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      # PostgreSQL 16 (primary database)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lending_user}:${POSTGRES_PASSWORD:-lending_secret}@postgres:5432/${POSTGRES_DB:-lending_db}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-lending_redis_pass}@redis:6379/0
      # Enable demo data seeding
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      # Increased for E2E parallel testing (each test creates its own session)
      MAX_CONCURRENT_SESSIONS: 200

  # ── Frontend (React + Vite dev server) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend-react
      target: dev
    container_name: lending_frontend
    restart: unless-stopped
    networks:
      - lending_net
    ports:
      - "3010:3000"
    volumes:
      - ./frontend-react:/app
      - /app/node_modules          # anonymous volume keeps node_modules inside container
    depends_on:
      - backend
    environment:
      VITE_GRAPHQL_URL: /api
      VITE_API_URL: http://localhost:8001
